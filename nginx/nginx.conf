# ═══════════════════════════════════════════════════════════════════════════════
#  Nginx Configuration — Relux Laundry
#  Edge-layer rate limiting + reverse proxy to Node.js backend (port 5000)
#
#  Architecture:  Client → Nginx (edge) → Node.js App → Redis → MongoDB
#
#  Rate-limit zones are defined in the http block and applied per location.
#  These limits are the FIRST line of defense — the app layer enforces
#  stricter, role-aware limits on top using Redis sliding windows.
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;                 # One worker per CPU core
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;                          # Efficient I/O on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'rl_limit=$limit_req_status';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;                # Hide Nginx version in headers

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Rate-Limit Zones ($binary_remote_addr = compact 4-byte IP key) ───────
    #
    #   Zone name     Key    Size    Rate
    #   ─────────────────────────────────────────────────────────────────────
    #   login_zone    IP     10 MB   5  req/min  (~0.08/s)
    #   otp_zone      IP     10 MB   3  req/min  (~0.05/s)
    #   forgot_zone   IP     10 MB   3  req/min  (~0.05/s)
    #   order_zone    IP     10 MB   10 req/min  (~0.17/s)
    #   payment_zone  IP     10 MB   5  req/min  (~0.08/s)
    #   admin_zone    IP     10 MB   300 req/min (5/s)
    #   api_zone      IP     20 MB   100 req/min (~1.67/s)
    #
    #   10 MB ≈ 160,000 IP addresses tracked simultaneously.

    limit_req_zone $binary_remote_addr zone=login_zone:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=otp_zone:10m     rate=3r/m;
    limit_req_zone $binary_remote_addr zone=forgot_zone:10m  rate=3r/m;
    limit_req_zone $binary_remote_addr zone=order_zone:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=payment_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m   rate=300r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m     rate=100r/m;

    # Return JSON on rate-limit rejection (matches app-layer error format)
    limit_req_status 429;
    limit_req_log_level warn;

    # ── Upstream — Node.js backend ────────────────────────────────────────────
    upstream nodejs_backend {
        server 127.0.0.1:5000;

        # For horizontal scaling — add more instances here:
        # server 127.0.0.1:5001;
        # server 127.0.0.1:5002;

        keepalive 32;                   # Persistent connections to backend
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name reluxlaundry.com www.reluxlaundry.com
                    staff.reluxlaundry.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    #  Customer Frontend — reluxlaundry.com
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name reluxlaundry.com www.reluxlaundry.com;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/reluxlaundry.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/reluxlaundry.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Proxy settings (shared across locations) ──────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_cache_bypass $http_upgrade;

        # ── POST /api/v1/auth/login — brute-force protection ─────────────────
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=3 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── POST /api/v1/auth/request-otp — OTP flood protection ─────────────
        location = /api/v1/auth/request-otp {
            limit_req zone=otp_zone burst=2 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── POST /api/v1/auth/forgot-password ────────────────────────────────
        location = /api/v1/auth/forgot-password {
            limit_req zone=forgot_zone burst=2 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Order creation — prevent spam orders ─────────────────────────────
        location = /api/v1/orders {
            limit_req zone=order_zone burst=5 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Payment endpoints — strictest limit ───────────────────────────────
        location ~* ^/api/v1/payments/paystack/ {
            limit_req zone=payment_zone burst=2 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Socket.IO (real-time order/notification updates) ──────────────────
        location /socket.io/ {
            proxy_pass         http://nodejs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── All other API routes — general limiter ────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Static uploaded files (order media, receipts) ─────────────────────
        location /uploads/ {
            alias /var/www/relux-laundry/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Root (serve React customer frontend) ──────────────────────────────
        location / {
            root   /var/www/relux-laundry/customer;
            try_files $uri $uri/ /index.html;
            expires 1h;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    #  Staff / Admin Dashboard — staff.reluxlaundry.com
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name staff.reluxlaundry.com;

        ssl_certificate     /etc/letsencrypt/live/staff.reluxlaundry.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staff.reluxlaundry.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_http_version 1.1;
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # ── Staff/admin login ─────────────────────────────────────────────────
        location = /api/v1/auth/login {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Admin/staff dashboard endpoints — higher limits ───────────────────
        location ~* ^/api/v1/(admin|analytics|reports|audit-logs|payroll|attendance)/ {
            limit_req zone=admin_zone burst=100 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Socket.IO ─────────────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://nodejs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Serve React staff/admin frontend ──────────────────────────────────
        location / {
            root   /var/www/relux-laundry/staff;
            try_files $uri $uri/ /index.html;
        }
    }
}
